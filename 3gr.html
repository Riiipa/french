<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жорсткий тренажер: Французькі дієслова 3 групи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pop-animation { animation: pop 0.3s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .verb-input {
            width: 140px;
            text-align: center;
            border-bottom: 3px solid #cbd5e1;
            background: transparent;
            transition: all 0.2s;
        }
        .verb-input:focus {
            outline: none;
            border-bottom-color: #4f46e5;
        }
        .verb-input:disabled {
            background-color: transparent;
        }
        /* Стилізація кастомних чекбоксів для вибору дієслів */
        .verb-checkbox:checked + div {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .verb-checkbox:checked + div .translation-text {
            color: #c7d2fe; /* Світліший текст перекладу, коли кнопка активна */
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center font-sans antialiased py-8 text-slate-800">

    <!-- ЕКРАН 1: НАЛАШТУВАННЯ (ЛОБІ) -->
    <div id="setupScreen" class="bg-white p-8 sm:p-10 rounded-3xl shadow-xl text-center max-w-4xl w-full mx-4 border border-slate-200 flex flex-col items-center">
        <h1 class="text-3xl font-black text-slate-800 mb-2">База дієслів B1</h1>
        <p class="text-slate-500 mb-6">Деконструкція 3-ї групи. Вибирай патерни, які ще не закріпив у пам'яті.</p>

        <div class="flex justify-between w-full mb-4 px-2 border-b border-slate-100 pb-4">
            <button onclick="toggleAllVerbs(true)" class="text-sm font-bold text-indigo-500 hover:text-indigo-700 uppercase tracking-wide">Увімкнути всі</button>
            <button onclick="toggleAllVerbs(false)" class="text-sm font-bold text-slate-400 hover:text-slate-600 uppercase tracking-wide">Скинути всі</button>
        </div>

        <!-- Контейнер для категорій генерується через JS -->
        <div id="verbCategoriesContainer" class="w-full mb-8 max-h-[50vh] overflow-y-auto px-2 text-left">
            <!-- Categories will be injected here -->
        </div>

        <div id="setupError" class="hidden text-red-500 font-bold mb-4 pop-animation">Ти не вибрав жодного дієслова. З чим ти зібрався тренуватись?</div>

        <button onclick="initSessionFromSetup()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-xl tracking-wide">
            СТАРТ ТРЕНУВАННЯ
        </button>
    </div>

    <!-- ЕКРАН 2: ТРЕНУВАННЯ -->
    <div id="trainingScreen" class="hidden bg-white p-8 sm:p-10 rounded-3xl shadow-xl text-center max-w-2xl w-full mx-4 border border-slate-200 flex flex-col items-center relative">
        
        <button onclick="returnToSetup()" class="absolute top-6 left-6 text-slate-400 hover:text-slate-600 transition-colors" title="Налаштування">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        <div class="flex justify-between w-full mb-6 items-center pl-10">
            <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Сесія: <span id="sessionCounter" class="text-indigo-500">1/15</span></span>
            <span class="text-xs font-bold text-slate-300 uppercase tracking-widest text-center">У черзі: <br><span id="globalDeckCounter" class="text-slate-500">?</span></span>
            <span class="text-sm font-bold text-red-400 uppercase tracking-widest">Помилок: <span id="mistakeCounter">0</span></span>
        </div>

        <div class="flex flex-col items-center justify-center w-full mb-6 min-h-[14rem]">
            <!-- ПОВЕРНЕНА МИЛИЦЯ: Інфінітив -->
            <span id="infinitiveHint" class="text-xs sm:text-sm text-slate-500 mb-3 font-bold bg-slate-200 px-4 py-1.5 rounded-full uppercase tracking-wider shadow-sm"></span>
            
            <span id="wordDisplay" class="text-2xl sm:text-3xl font-bold text-indigo-600 mb-8 mt-2">???</span>
            
            <div class="flex flex-wrap items-baseline justify-center gap-x-3 gap-y-4 text-2xl sm:text-3xl font-semibold text-slate-700 w-full">
                <span id="prefixDisplay"></span>
                <input type="text" id="userInput" class="verb-input text-indigo-700 font-bold" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                <span id="suffixDisplay"></span>
            </div>

            <div id="feedbackContainer" class="hidden flex flex-col items-center mt-8 w-full">
                <span id="feedbackDisplay" class="text-xl sm:text-2xl font-bold mb-2"></span>
                <button onclick="playCurrentAudio()" class="p-3 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 rounded-full transition-colors focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.236l4.328 4.328a2 2 0 003.436-1.414V5.086a2 2 0 00-3.436-1.414L9.236 8H7a2 2 0 00-2 2z" />
                    </svg>
                </button>
            </div>
        </div>

        <button id="checkBtn" onclick="checkAnswer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-lg mb-4">
            Перевірити
        </button>

        <button id="nextBtn" onclick="nextTask()" class="hidden w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-lg mb-4">
            Далі
        </button>

        <button id="ruleToggleBtn" onclick="toggleRule()" class="text-indigo-500 hover:text-indigo-700 font-medium underline transition-colors text-sm py-2 px-4 rounded-lg">
            Показати правило
        </button>

        <div id="ruleBox" class="hidden mt-4 p-5 bg-indigo-50 rounded-2xl border border-indigo-100 text-left text-sm text-indigo-900 w-full shadow-inner"></div>
    </div>

    <!-- ЕКРАН 3: СТАТИСТИКА -->
    <div id="statsScreen" class="hidden bg-white p-8 sm:p-12 rounded-3xl shadow-xl text-center max-w-md w-full mx-4 border border-slate-200 flex flex-col items-center">
        <h2 class="text-3xl font-black text-slate-800 mb-2">Сесію завершено</h2>
        <p class="text-slate-500 mb-8">Ось твої реальні результати.</p>

        <div class="grid grid-cols-2 gap-4 w-full mb-8">
            <div class="bg-green-50 rounded-2xl p-4 border border-green-100">
                <span class="block text-4xl font-black text-green-500 mb-1" id="statCorrect">15</span>
                <span class="text-sm font-bold text-green-700 uppercase">Правильно</span>
            </div>
            <div class="bg-red-50 rounded-2xl p-4 border border-red-100">
                <span class="block text-4xl font-black text-red-500 mb-1" id="statMistakes">3</span>
                <span class="text-sm font-bold text-red-700 uppercase">Помилок</span>
            </div>
        </div>

        <div class="w-full bg-slate-100 rounded-full h-4 mb-2">
            <div id="accuracyBar" class="bg-indigo-500 h-4 rounded-full" style="width: 80%"></div>
        </div>
        <p class="text-indigo-700 font-bold mb-8">Точність: <span id="accuracyText">80%</span></p>

        <button onclick="startSession()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-lg mb-3">
            Продовжити тренування
        </button>
        <button onclick="returnToSetup()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-6 rounded-2xl transition-all active:scale-95 text-base">
            Змінити набір дієслів
        </button>
    </div>

    <script>

        // --- ЛОГІКА НАЛАШТУВАНЬ ТА ПАМ'ЯТІ ---
        
        function getSavedSelection() {
            const saved = localStorage.getItem('frenchVerbsSelectionB1'); // Змінив ключ, щоб не конфліктувало зі старою базою
            if (saved) {
                try { return JSON.parse(saved); } catch (e) { return null; }
            }
            return null;
        }

        function saveSelection() {
            const checkboxes = document.querySelectorAll('.verb-checkbox');
            const selected = [];
            checkboxes.forEach(cb => {
                if (cb.checked) selected.push(cb.value);
            });
            localStorage.setItem('frenchVerbsSelectionB1', JSON.stringify(selected));
        }

        function initSetupScreen() {
            const container = document.getElementById('verbCategoriesContainer');
            container.innerHTML = '';
            
            const savedSelection = getSavedSelection();

            // Групуємо дієслова за категоріями
            const groupedVerbs = {};
            rawData.forEach(verb => {
                if (!groupedVerbs[verb.category]) groupedVerbs[verb.category] = [];
                groupedVerbs[verb.category].push(verb);
            });

            // Рендеримо категорії
            Object.keys(groupedVerbs).forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = "mb-8";
                categoryDiv.innerHTML = `<h3 class="text-lg font-bold text-slate-700 mb-3 border-b-2 border-indigo-100 inline-block pb-1">${category}</h3>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3";

                groupedVerbs[category].forEach(verbObj => {
                    const isChecked = savedSelection ? savedSelection.includes(verbObj.infFr) : true; 
                    
                    const label = document.createElement('label');
                    label.className = "cursor-pointer relative block h-full";
                    label.innerHTML = `
                        <input type="checkbox" value="${verbObj.infFr}" class="verb-checkbox sr-only" ${isChecked ? 'checked' : ''} onchange="saveSelection()">
                        <div class="h-full px-3 py-3 rounded-xl border-2 border-slate-200 text-slate-600 flex flex-col items-center justify-center transition-all hover:bg-slate-50 bg-white shadow-sm">
                            <span class="font-bold text-base sm:text-lg mb-1">${verbObj.infFr}</span>
                            <span class="translation-text text-[10px] uppercase font-semibold tracking-wider text-slate-400 text-center leading-tight">${verbObj.infUk}</span>
                        </div>
                    `;
                    grid.appendChild(label);
                });

                categoryDiv.appendChild(grid);
                container.appendChild(categoryDiv);
            });

            document.getElementById('setupScreen').classList.remove('hidden');
            document.getElementById('trainingScreen').classList.add('hidden');
            document.getElementById('statsScreen').classList.add('hidden');
        }

        function toggleAllVerbs(state) {
            const checkboxes = document.querySelectorAll('.verb-checkbox');
            checkboxes.forEach(cb => cb.checked = state);
            saveSelection();
        }

        function returnToSetup() {
            document.getElementById('setupScreen').classList.remove('hidden');
            document.getElementById('trainingScreen').classList.add('hidden');
            document.getElementById('statsScreen').classList.add('hidden');
            unmasteredCards = []; // Очищаємо колоду при виході в меню
        }

        // --- ОСНОВНИЙ РУШІЙ ТРЕНУВАННЯ ---

        let allDatabaseCards = [];
        const SESSION_LENGTH = 15;
        let sessionQueue = [];
        let currentCard = null;
        let sessionStats = { mistakes: 0, completed: 0, totalErrors: 0 };
        let unmasteredCards = [];
        let frVoice = null;

        function initSessionFromSetup() {
            const checkboxes = document.querySelectorAll('.verb-checkbox:checked');
            if (checkboxes.length === 0) {
                const errorEl = document.getElementById('setupError');
                errorEl.classList.remove('hidden');
                errorEl.classList.remove('pop-animation');
                void errorEl.offsetWidth;
                errorEl.classList.add('pop-animation');
                return;
            }
            document.getElementById('setupError').classList.add('hidden');

            const selectedVerbs = Array.from(checkboxes).map(cb => cb.value);
            
            allDatabaseCards = [];
            rawData.forEach(verbObj => {
                if (selectedVerbs.includes(verbObj.infFr)) {
                    const conjugationTable = verbObj.forms.map(f => (f.prefix.endsWith("'") ? f.prefix : f.prefix + " ") + f.verb);
                    verbObj.forms.forEach(form => {
                        allDatabaseCards.push({
                            infFr: verbObj.infFr,
                            infUk: verbObj.infUk,
                            prefix: form.prefix,
                            verb: form.verb,
                            suffix: form.suffix,
                            ukFull: form.ukFull,
                            rule: verbRules[verbObj.infFr] || "Правило відсутнє.",
                            allForms: conjugationTable
                        });
                    });
                }
            });

            unmasteredCards = shuffle([...allDatabaseCards]);
            startSession();
        }

        function loadVoices() {
            if (!window.speechSynthesis) return;
            const voices = window.speechSynthesis.getVoices();
            frVoice = voices.find(v => v.lang === 'fr-FR' || v.lang === 'fr_FR' || v.lang.startsWith('fr-'));
        }

        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        function playAudio(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'fr-FR';
            utter.rate = 0.85; 
            if (!frVoice) loadVoices(); 
            if (frVoice) utter.voice = frVoice;
            window.speechSynthesis.speak(utter);
        }

        function playCurrentAudio() {
            if (currentCard) {
                const fullPhrase = `${currentCard.prefix} ${currentCard.verb} ${currentCard.suffix}`.replace(/' /g, "'");
                playAudio(fullPhrase);
            }
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startSession() {
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('statsScreen').classList.add('hidden');
            document.getElementById('trainingScreen').classList.remove('hidden');
            
            if (unmasteredCards.length === 0) {
                unmasteredCards = shuffle([...allDatabaseCards]);
                if (sessionStats.completed > 0) {
                    alert("Всі картки з вибраного набору пройдені! Починаємо нове коло.");
                }
            }
            
            const cardsToTake = Math.min(SESSION_LENGTH, unmasteredCards.length);
            sessionQueue = unmasteredCards.splice(0, cardsToTake);
            sessionQueue.forEach(card => card.mistakesThisSession = 0);
            
            sessionStats = { mistakes: 0, completed: 0, totalErrors: 0 };
            updateUIStats();
            loadNextCard();
        }

        function updateUIStats() {
            const currentSessionTotal = sessionStats.completed + sessionQueue.length + (currentCard ? 1 : 0);
            document.getElementById('sessionCounter').innerText = `${sessionStats.completed + 1}/${currentSessionTotal || SESSION_LENGTH}`;
            document.getElementById('mistakeCounter').innerText = sessionStats.totalErrors;
            
            let globalCounter = document.getElementById('globalDeckCounter');
            if (globalCounter) {
                globalCounter.innerText = unmasteredCards.length + sessionQueue.length + (currentCard ? 1 : 0);
            }
        }

        function loadNextCard() {
            if (sessionQueue.length === 0) {
                showStatsScreen();
                return;
            }

            currentCard = sessionQueue[0];
            updateUIStats();

            // Вставляємо інфінітив та його переклад у плашку
            document.getElementById('infinitiveHint').innerText = `${currentCard.infFr} — ${currentCard.infUk}`;
            
            document.getElementById('wordDisplay').innerText = currentCard.ukFull;
            
            const prefixDisplay = document.getElementById('prefixDisplay');
            prefixDisplay.innerText = currentCard.prefix.endsWith("'") ? currentCard.prefix : currentCard.prefix + " ";
            document.getElementById('suffixDisplay').innerText = " " + currentCard.suffix;
            
            const input = document.getElementById('userInput');
            input.value = '';
            input.disabled = false;
            input.style.width = Math.max(100, currentCard.verb.length * 18) + 'px';
            input.classList.remove('text-green-600', 'text-red-500', 'border-green-500', 'border-red-500');
            input.classList.add('text-indigo-700', 'border-slate-300');
            
            document.getElementById('feedbackContainer').classList.add('hidden');
            document.getElementById('checkBtn').classList.remove('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            
            document.getElementById('ruleBox').classList.add('hidden');
            document.getElementById('ruleToggleBtn').innerText = "Показати правило";

            input.focus();
        }

        function checkAnswer() {
            const input = document.getElementById('userInput');
            if (!input.value.trim()) return;

            const normalize = (str) => str.toLowerCase().replace(/[’`]/g, "'").trim();
            const userVerb = normalize(input.value);
            const correctVerb = normalize(currentCard.verb);

            input.disabled = true;
            document.getElementById('feedbackContainer').classList.remove('hidden');
            const feedbackText = document.getElementById('feedbackDisplay');

            if (userVerb === correctVerb) {
                feedbackText.innerText = "Ідеально ✓";
                feedbackText.className = "text-xl sm:text-2xl font-bold mb-2 text-green-600 pop-animation";
                input.classList.remove('text-indigo-700', 'border-slate-300');
                input.classList.add('text-green-600', 'border-green-500');
                
                playCurrentAudio();

                const finishedCard = sessionQueue.shift();
                currentCard = null; 
                sessionStats.completed++;
                
                if (finishedCard.mistakesThisSession > 0) {
                    unmasteredCards.push(finishedCard);
                }
            } else {
                sessionStats.totalErrors++;
                sessionStats.mistakes++;
                currentCard.mistakesThisSession++;
                
                input.value = currentCard.verb; 
                feedbackText.innerHTML = `Помилка. Ти мав написати: <span class="text-indigo-600 font-black">${currentCard.verb}</span>`;
                feedbackText.className = "text-xl sm:text-2xl mb-2 text-red-500 pop-animation";
                input.classList.remove('text-indigo-700', 'border-slate-300');
                input.classList.add('text-red-500', 'border-red-500');

                const card = sessionQueue.shift();
                const insertIndex = Math.min(3, sessionQueue.length);
                sessionQueue.splice(insertIndex, 0, card);
                
                playCurrentAudio();
            }

            document.getElementById('checkBtn').classList.add('hidden');
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('hidden');
            nextBtn.focus();
        }

        function nextTask() {
            loadNextCard();
        }

        function showStatsScreen() {
            document.getElementById('trainingScreen').classList.add('hidden');
            const stats = document.getElementById('statsScreen');
            stats.classList.remove('hidden');

            document.getElementById('statCorrect').innerText = sessionStats.completed;
            document.getElementById('statMistakes').innerText = sessionStats.totalErrors;

            const totalAttempts = sessionStats.completed + sessionStats.totalErrors;
            const accuracy = Math.round((sessionStats.completed / totalAttempts) * 100) || 0;
            
            document.getElementById('accuracyText').innerText = accuracy + '%';
            
            const bar = document.getElementById('accuracyBar');
            bar.style.width = accuracy + '%';
            
            if (accuracy >= 90) bar.className = "bg-green-500 h-4 rounded-full";
            else if (accuracy >= 70) bar.className = "bg-yellow-500 h-4 rounded-full";
            else bar.className = "bg-red-500 h-4 rounded-full";
        }

        function toggleRule() {
            const ruleBox = document.getElementById('ruleBox');
            const ruleBtn = document.getElementById('ruleToggleBtn');
            
            if (ruleBox.classList.contains('hidden')) {
                const ruleText = currentCard ? currentCard.rule : "Перейди до наступного завдання.";
                let html = `<p class="font-medium leading-relaxed">${ruleText}</p>`;
                
                if (currentCard && currentCard.allForms) {
                    html = `<p class="mb-4 font-medium leading-relaxed">${ruleText}</p>
                            <div class="grid grid-cols-2 gap-x-3 gap-y-2 text-slate-700 bg-white p-3 rounded-xl border border-indigo-100 shadow-sm font-medium">
                                ${currentCard.allForms.map(f => `<div>${f}</div>`).join('')}
                            </div>`;
                }
                
                ruleBox.innerHTML = html;
                ruleBox.classList.remove('hidden');
                ruleBtn.innerText = "Сховати правило";
            } else {
                ruleBox.classList.add('hidden');
                ruleBtn.innerText = "Показати правило";
            }
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkAnswer();
            }
        });

        window.onload = initSetupScreen;
    </script>
</body>
</html>
