<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Генератор Дієслів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pop-animation { animation: pop 0.3s ease-out forwards; }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .verb-input {
            width: 160px;
            text-align: center;
            border-bottom: 3px solid #cbd5e1;
            background: transparent;
            transition: all 0.2s;
            font-size: 1.5rem; 
        }
        .verb-input:focus { outline: none; border-bottom-color: #4f46e5; }
        .verb-input:disabled { background-color: transparent; }
        
        /* Loading spinner */
        .loader {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 min-h-[100dvh] flex flex-col items-center justify-start sm:justify-center pt-4 sm:pt-8 pb-4 text-slate-800">

    <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-xl text-center max-w-3xl w-full mx-4 border border-slate-200 flex flex-col items-center relative">
        
        <div class="flex items-center justify-between w-full mb-6 border-b border-slate-100 pb-4">
            <a href="index.html" class="text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                <span class="font-bold hidden sm:inline">В лобі</span>
            </a>
            <h1 class="text-2xl sm:text-3xl font-black text-indigo-600 uppercase tracking-widest">AI Генератор 🤖</h1>
            <div class="w-6"></div>
        </div>

        <!-- НАЛАШТУВАННЯ API -->
        <div class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 mb-6 text-left">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Gemini API Key (зберігається локально)</label>
            <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full p-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-indigo-500 mb-2">
            <p class="text-[10px] text-slate-400">Без ключа генерація працюватиме лише у середовищі з вбудованим ключем. Отримати безкоштовно можна в <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-500 underline">Google AI Studio</a>.</p>
            
            <div class="mt-4 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 pt-4 border-t border-slate-200">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Модель ШІ:</label>
                <select id="aiModel" class="p-2 border border-slate-300 rounded-lg text-sm font-medium focus:outline-none text-slate-700 bg-white cursor-pointer w-full sm:w-auto">
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (Найрозумніша)</option>
                    <option value="gemini-1.5-flash" selected>Gemini 1.5 Flash (Швидка)</option>
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash (Нова)</option>
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                </select>
            </div>
        </div>

        <!-- ПАРАМЕТРИ ГЕНЕРАЦІЇ -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full mb-6">
            <div class="text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Група / Тип</label>
                <select id="verbType" class="w-full p-2 border border-slate-300 rounded-lg text-sm font-medium focus:outline-none">
                    <option value="випадкове дієслово 1, 2 або 3 групи">Будь-яке (Мікс)</option>
                    <option value="зворотні дієслова (les verbes pronominaux)">Зворотні (se laver, etc.)</option>
                    <option value="правильні дієслова 1 групи на -er">1 Група (-ER)</option>
                    <option value="правильні дієслова 2 групи на -ir">2 Група (-IR)</option>
                    <option value="неправильні дієслова 3 групи">3 Група (Винятки)</option>
                </select>
            </div>
            <div class="text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Час</label>
                <select id="tenseType" class="w-full p-2 border border-slate-300 rounded-lg text-sm font-medium focus:outline-none">
                    <option value="Présent">Présent (Теперішній)</option>
                    <option value="Passé Composé">Passé Composé</option>
                    <option value="Futur Simple">Futur Simple</option>
                    <option value="Imparfait">Imparfait</option>
                </select>
            </div>
            <div class="text-left">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Форма речення</label>
                <select id="sentenceForm" class="w-full p-2 border border-slate-300 rounded-lg text-sm font-medium focus:outline-none">
                    <option value="стверджувальне">Стверджувальна</option>
                    <option value="заперечне (з ne ... pas)">Заперечна (ne...pas)</option>
                    <option value="питальне">Питальна</option>
                </select>
            </div>
        </div>

        <button id="generateBtn" onclick="generateTask()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-black py-4 px-6 rounded-2xl shadow-md transition-all active:scale-95 text-lg uppercase tracking-widest flex items-center justify-center gap-2 mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            Згенерувати завдання
        </button>

        <!-- ЗОНА ТРЕНУВАННЯ (Прихована до генерації) -->
        <div id="trainingZone" class="hidden w-full flex flex-col items-center">
            
            <div class="flex items-center gap-2 mb-4">
                <span id="infHint" class="text-xs text-slate-600 font-bold bg-slate-200 px-3 py-1.5 rounded-full uppercase tracking-wider"></span>
                <span id="tenseHint" class="text-xs text-white font-black bg-indigo-500 px-3 py-1.5 rounded-full uppercase tracking-wider"></span>
            </div>

            <span id="uaSentence" class="text-xl sm:text-2xl font-bold text-slate-800 mb-8 mt-2"></span>

            <div class="flex flex-wrap items-baseline justify-center gap-x-2 gap-y-3 text-xl sm:text-2xl font-semibold text-slate-700 w-full mb-6">
                <span id="prefixText"></span>
                <input type="text" id="userInput" class="verb-input text-indigo-700 font-bold" autocomplete="off" spellcheck="false">
                <span id="suffixText"></span>
            </div>

            <div id="feedbackBox" class="hidden flex-col items-center w-full mb-4 pop-animation">
                <span id="feedbackText" class="text-xl font-bold mb-2"></span>
                <p id="explanationText" class="text-sm text-slate-500 mt-2 bg-slate-50 p-3 rounded-lg border border-slate-200 w-full text-left"></p>
            </div>

            <button id="checkBtn" onclick="checkAnswer()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-2xl transition-all active:scale-95 text-lg">
                Перевірити
            </button>
        </div>

        <!-- ІНДИКАТОР ЗАВАНТАЖЕННЯ -->
        <div id="loadingZone" class="hidden w-full flex-col items-center py-8">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-bold animate-pulse">ШІ придумує речення...</p>
        </div>

    </div>

    <script>
        // Вбудований ключ для середовища виконання, якщо користувач не ввів свій
        const envApiKey = ""; 
        let currentTaskData = null;

        // Завантаження ключа з пам'яті
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem("userGeminiKey");
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        });

        // Слухач на Enter у полі вводу
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!document.getElementById('checkBtn').classList.contains('hidden')) {
                    checkAnswer();
                } else {
                    generateTask(); // Якщо вже перевірено, генеруємо нове по Enter
                }
            }
        });

        async function generateTask() {
            const keyInput = document.getElementById('apiKeyInput').value.trim();
            if (keyInput) localStorage.setItem("userGeminiKey", keyInput);
            
            const apiKey = keyInput || envApiKey;
            if (!apiKey) {
                alert("Будь ласка, введіть API ключ Gemini.");
                return;
            }

            // UI стан
            document.getElementById('trainingZone').classList.add('hidden');
            document.getElementById('loadingZone').classList.remove('hidden');
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').classList.add('opacity-50');

            const verbType = document.getElementById('verbType').value;
            const tenseType = document.getElementById('tenseType').value;
            const sentenceForm = document.getElementById('sentenceForm').value;

            // Створюємо Промпт для ШІ
            const systemPrompt = `You are an expert French teacher API. Generate a single French grammar exercise.
Strictly follow this JSON schema:
{
  "infinitive_fr": "infinitive verb in French (e.g. se réveiller)",
  "infinitive_ua": "translation of infinitive in Ukrainian",
  "tense": "Tense used",
  "sentence_ua": "The full sentence in Ukrainian",
  "prefix_fr": "The part of the French sentence BEFORE the verb to guess. Include subject pronouns, negation 'ne', reflexive pronouns 'me/te/se' if applicable.",
  "verb_to_guess": "The EXACT conjugated verb part the user must type. In Passé Composé, this should include both the auxiliary and the past participle (e.g. 'suis réveillé'). In negative, do not include 'ne' or 'pas' here if they can be in prefix/suffix.",
  "suffix_fr": "The rest of the sentence AFTER the verb. Include 'pas' here if it comes after the verb.",
  "explanation_ua": "Brief explanation in Ukrainian of why this conjugation is correct (mention the rule)."
}
Rules:
- The task must focus on: Verb Type: ${verbType}, Tense: ${tenseType}, Form: ${sentenceForm}.
- "verb_to_guess" should ONLY contain the verb itself (and auxiliary if compound tense). Do not include pronouns.
- E.g., for "Je ne me lave pas", prefix="Je ne me ", verb="lave", suffix=" pas".
- E.g., for "Est-ce qu'il a mangé ?", prefix="Est-ce qu'il ", verb="a mangé", suffix=" ?".
- Return ONLY valid JSON, no markdown formatting.`;

            const payload = {
                contents: [{ parts: [{ text: "Згенеруй нове завдання." }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            try {
                const selectedModel = document.getElementById('aiModel').value;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    // Отримуємо детальну помилку від Google для зручного дебагу
                    const errorData = await response.json();
                    console.error("Деталі помилки API:", errorData);
                    throw new Error(`Код ${response.status}: ${errorData.error?.message || 'Невідома помилка API'}`);
                }

                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text;
                currentTaskData = JSON.parse(jsonText);

                renderTask();

            } catch (error) {
                console.error(error);
                alert("Помилка при генерації: " + error.message);
                document.getElementById('trainingZone').classList.add('hidden');
            } finally {
                document.getElementById('loadingZone').classList.add('hidden');
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('generateBtn').classList.remove('opacity-50');
            }
        }

        function renderTask() {
            if (!currentTaskData) return;

            document.getElementById('infHint').innerText = `${currentTaskData.infinitive_fr} — ${currentTaskData.infinitive_ua}`;
            document.getElementById('tenseHint').innerText = currentTaskData.tense;
            document.getElementById('uaSentence').innerText = currentTaskData.sentence_ua;
            
            document.getElementById('prefixText').innerText = currentTaskData.prefix_fr;
            document.getElementById('suffixText').innerText = currentTaskData.suffix_fr;

            const input = document.getElementById('userInput');
            input.value = '';
            input.disabled = false;
            // Динамічна ширина поля
            input.style.width = Math.max(100, currentTaskData.verb_to_guess.length * 15) + 'px';
            input.className = "verb-input text-indigo-700 font-bold border-slate-300";

            document.getElementById('feedbackBox').classList.add('hidden');
            document.getElementById('checkBtn').classList.remove('hidden');
            document.getElementById('checkBtn').innerText = "Перевірити";
            
            document.getElementById('trainingZone').classList.remove('hidden');
            input.focus();
        }

        function checkAnswer() {
            const input = document.getElementById('userInput');
            if (!input.value.trim()) return;

            const normalize = (str) => str.toLowerCase().replace(/[’`]/g, "'").trim();
            const userVerb = normalize(input.value);
            const correctVerb = normalize(currentTaskData.verb_to_guess);

            input.disabled = true;
            document.getElementById('feedbackBox').classList.remove('hidden');
            document.getElementById('feedbackBox').classList.add('flex');
            const feedbackText = document.getElementById('feedbackText');

            if (userVerb === correctVerb) {
                feedbackText.innerText = "Ідеально ✓";
                feedbackText.className = "text-2xl font-bold mb-2 text-green-600";
                input.className = "verb-input font-bold text-green-600 border-green-500";
            } else {
                input.value = currentTaskData.verb_to_guess; 
                feedbackText.innerHTML = `Помилка. Треба: <span class="text-indigo-600">${currentTaskData.verb_to_guess}</span>`;
                feedbackText.className = "text-2xl font-bold mb-2 text-red-500";
                input.className = "verb-input font-bold text-red-500 border-red-500";
            }

            document.getElementById('explanationText').innerText = "💡 " + currentTaskData.explanation_ua;
            
            const btn = document.getElementById('checkBtn');
            btn.innerText = "Наступне завдання (Або Enter)";
            btn.onclick = generateTask;
            btn.focus();
        }
    </script>
</body>
</html>
